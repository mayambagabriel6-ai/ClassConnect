<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres</title>
    <link rel="icon" href="../favicon.png">
    <link rel="stylesheet" href="pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="body">
    <aside class="side-bar">
        <div class="logo"><i class="fas fa-user-graduate"></i>ClassConnect</div>
        <div class="profile-container">
            <a href="profil.html" class="profil-link"><i class="fas fa-user"></i></a>
        </div>
        <nav>
            <ul>
                <li><a href="accueil.html"><i class="fas fa-search"></i>Explorer</a></li>
                <li><a href="messagerie.html"><i class="fas fa-envelope"></i>Messagerie</a></li>
                <li><a href="FAQ.html"><i class="fas fa-circle-question"></i>FAQ</a></li>
                <li><a href="parametres.html"><i class="fas fa-cog"></i>Paramètres</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main">
        <section class="profil-section">
            <h2><i class="fas fa-sliders-h"></i> Paramètres</h2>

            <section class="section-parametres">
                <h3><i class="fas fa-lock"></i> Sécurité</h3>
                <form class="form-parametres">
                    <div class="form-group">
                        <label for="ancien-mdp">Mot de passe actuel</label>
                        <input type="password" id="ancien-mdp" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="nouveau-mdp">Nouveau mot de passe</label>
                        <input type="password" id="nouveau-mdp" placeholder="Minimum 8 caractères">
                    </div>
                    <button type="submit" class="btn-sauvegarder">Mettre à jour le mot de passe</button>
                </form>
            </section>

            <section class="section-parametres">
                <h3><i class="fas fa-cog"></i> Préférences</h3>
                <div class="option-check">
                    <input type="checkbox" id="notif-email" checked>
                    <label for="notif-email">Recevoir un email à chaque nouveau message</label>
                </div>
                <div class="option-check">
                    <input type="checkbox" id="mode-sombre-toggle">
                    <label for="mode-sombre-toggle">Activer le mode sombre (Dark Mode)</label>
                </div>
            </section>

            <section class="section-parametres danger-zone">
                <h3><i class="fas fa-exclamation-triangle"></i> Actions de compte</h3>
                <div class="action-danger">
                    <a href="../index.html" class="btn-deconnexion">Se déconnecter</a>
                    <button class="btn-supprimer">Supprimer définitivement mon compte</button>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
