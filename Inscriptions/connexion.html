<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="favicon" href="../favicon.png">
    <link rel="stylesheet" href="inscriptions.css">
    <title>Connectez-vous</title>
</head>
<body>
    <form action="#" method="post">
        <h2>Nous sommes contents de vous revoir!</h2>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="Email" id="email" placeholder="Adresse e-mail" required> <br>
        </div>
        <div class="form-group">
            <label for="mdp">Mot de passe:</label>
            <input type="password" name="Mot de passe" id="mdp" placeholder="Mot de passe" required autocomplete="current-password"> <br>
        </div>
        <div>
            <a href="../Pages/accueil.html" class="submit">Se connecter</a>
        </div>
        <p class="switch-text">Vous n'avez pas de compte ?</p>
        <a class="link" href="etud.html">Créer un compte</a>
    </form>
    <!--script type="module" src="../js/connexion.js"></script-->
</body>
</html>
