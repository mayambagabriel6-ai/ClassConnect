<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Je suis un étudiant</title>
    <link rel="icon" href="../favicon.png">
    <link rel="stylesheet" href="inscriptions.css">
</head>

<body>
    <form action="" id="registerForm">
        <h2>Rejoignez ClassConnect !</h2><br>
        <div class="role"><a href="etud.html" class="role-et active" >Je suis un étudiant</a><a href="tuteur.html" class="role-tut">Je suis un tuteur</a></div>

        <h3>Inscrivez-vous en tant qu'étudiant pour trouver le soutien dont vous avez besoin.</h3>
        <label for="nom">Nom</label>
        <input type="text" name="Nom" id="nom" placeholder="Nom" label="Nom" required> <br>
        <label for="prenom">Prénom</label>
        <input type="text" name="Prénom" id="prenom" placeholder="Prénom" label="Prénom" required> <br>
        <label for="email">Email</label>
        <input type="email" name="Email" id="email" placeholder="Adresse e-mail" label="Email" required> <br>
        <div class="form-row">
        <div class="form-group">
        <label for="uni">Université</label>
        <select type="text" name="université" id="uni" label="Niveau d'étude" class="dropdown">
            <option value="none" class="dropdown-option">Aucune</option>
            <option value="upc" class="dropdown-option">Université Protestante au Congo</option>
            <option value="ucc" class="dropdown-option">Université Catholique du Congo</option>
            <option value="unikin" class="dropdown-option">Université de Kinshasa</option>
            <option value="upn" class="dropdown-option">Université Pédagogique Nationale</option>
            <option value="loyola" class="dropdown-option">Université Loyola au Congo</option>
            <option value="autre" class="dropdown-option">Autre</option>
        </select>
        </div>
        <div class="form-group">
        <label for="fil">Filière</label>
        <select type="text" name="Filière" id="fil" label="Filière" class="dropdown">
            <option value="droit" class="dropdown-option">Droit</option>
            <option value="info" class="dropdown-option">Informatique</option>
            <option value="eco" class="dropdown-option">Economie</option>
            <option value="med" class="dropdown-option">Médecine</option>
            <option value="ing" class="dropdown-option">Ingénierie</option>
            <option value="autre" class="dropdown-option">Autre</option>
        </select>
        </div>
        <div class="form-group">
        <label for="niv">Niveau d'étude</label>
        <select type="text" name="Niveau" id="niv" label="Niveau d'étude" class="dropdown">
            <option value="licence1" class="dropdown-option">Licence1</option>
            <option value="licence2" class="dropdown-option">Licence2</option>
            <option value="licence3" class="dropdown-option">Licence3</option>
            <option value="licence4" class="dropdown-option">Licence4</option>
            <option value="master1" class="dropdown-option">Master1</option>
            <option value="master2" class="dropdown-option">Master2</option>
            <option value="doctorat1" class="dropdown-option">Doctorat1</option>
            <option value="doctorat2" class="dropdown-option">Doctorat2</option>
        </select>
        </div>
        </div>
        <label for="matieres" class="bubble">Matières d'intérêt</label>
        <div class="matieres">
            <div class="bubble-item">
                <input type="checkbox" id="math" name="matieres" value="math">
                <label for="math">Mathématiques</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="physique" name="matieres" value="physique">
                <label for="physique">Physique</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="chimie" name="matieres" value="chimie">
                <label for="chimie">Chimie</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="prog" name="matieres" value="prog">
                <label for="prog">Programmation</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="eco" name="matieres" value="eco">
                <label for="eco">Economie</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="lang" name="matieres" value="lang">
                <label for="lang">Langues</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="elec" name="matieres" value="elec">
                <label for="elec">Électronique/Électricité</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="autre" name="matieres" value="autre">
                <label for="autre">Autre</label>
            </div>
        </div>
        <br>
        <label for="disponibilité" class="bubble">Disponibilité</label>
        <div class="disponibilité">
            <div class="bubble-item">
                <input type="checkbox" id="lundi" name="disponibilité" value="lundi">
                <label for="lundi">Lundi</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="mardi" name="disponibilité" value="mardi">
                <label for="mardi">Mardi</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="mercredi" name="disponibilité" value="mercredi">
                <label for="mercredi">Mercredi</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="vendredi" name="disponibilité" value="vendredi">
                <label for="vendredi">Vendredi</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="samedi" name="disponibilité" value="samedi">
                <label for="samedi">Samedi</label>
            </div>
            <div class="bubble-item">
                <input type="checkbox" id="dimanche" name="disponibilité" value="dimanche">
                <label for="dimanche">Dimanche</label>
            </div>
        </div>
        <label for="bio">Bio</label>
        <textarea name="bio" id="bio" placeholder="Parlez-nous un peu de vous..." required></textarea> <br>
        <br><label for="mdp">Mot de passe</label>
        <input type="password" name="Mot de passe" id="mdp" placeholder="Mot de passe" required> <br>
        <label for="mdp2">Confirmer mot de passe</label>
        <input type="password" name="Confirmer mot de passe" id="mdp2" placeholder="Confirmer mot de passe" required> <br>
        <input type="submit" value="S'inscrire">
    <p class="switch-text">Vous avez déjà un compte ?</p>
    <a class="link" href="connexion.html">Se connecter à mon compte</a>
    <br>
    <a href="../index.html">Retour à l'accueil</a></P>
</form> <br>
   
    <script type="module" src="../js/inscription.js"></script>
</body>
</html>
